name: OpenAPI Spec Check

on:
  pull_request:
    paths:
      - "app/**"
      - "openapi.json"
      - "scripts/export_openapi.py"
      - "pyproject.toml"
      - ".github/workflows/openapi-check.yml"
  push:
    branches: [main]

jobs:
  check-openapi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Export OpenAPI spec
        run: make specs

      - name: Verify openapi.json is up to date
        run: |
          if ! git diff --exit-code openapi.json; then
            echo "::error::openapi.json is out of date. Run 'uv run python scripts/export_openapi.py' and commit the result."
            exit 1
          fi
